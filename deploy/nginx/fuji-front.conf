# Снято с 37.139.43.117 — фронт + API proxy
server {
    server_name menu.franchise-fuji.ru www.menu.franchise-fuji.ru 37.139.43.117;

    root /home/ubuntu/menu/fuji-qr-app/dist;
    index index.html;

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ^~ /_ipx/ {
        proxy_pass https://apiv2.infra-fuji.ru/_ipx/;
        proxy_ssl_server_name on;
        proxy_set_header Host apiv2.infra-fuji.ru;
    }

    location ^~ /uploads/ {
        proxy_pass https://apiv2.infra-fuji.ru/uploads/;
        proxy_ssl_server_name on;
        proxy_set_header Host apiv2.infra-fuji.ru;
    }

    location ^~ /content/ {
        proxy_pass https://apiv2.infra-fuji.ru/content/;
        proxy_ssl_server_name on;
        proxy_set_header Host apiv2.infra-fuji.ru;
    }

    location /health {
        proxy_pass http://127.0.0.1:3101;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|webp|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/menu.franchise-fuji.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menu.franchise-fuji.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = menu.franchise-fuji.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name menu.franchise-fuji.ru www.menu.franchise-fuji.ru 37.139.43.117;
    return 404;
}
